# Local development stack
# Provides DynamoDB Local and a Mosquitto MQTT broker
# so the full system can be tested without cloud services.

services:
  # Local DynamoDB for testing
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: rfid-dynamodb
    ports:
      - "8000:8000"
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb", "-inMemory"]
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:8000 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Local MQTT broker (Mosquitto)
  mqtt-broker:
    image: eclipse-mosquitto:2
    container_name: rfid-mqtt
    ports:
      - "1883:1883"   # MQTT
      - "9001:9001"   # WebSocket (for dashboard)
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-t", "$$SYS/#", "-C", "1", "-W", "3"]
      interval: 10s
      timeout: 5s
      retries: 3

  # DynamoDB table creation on startup
  dynamodb-setup:
    image: amazon/aws-cli:latest
    container_name: rfid-db-setup
    depends_on:
      dynamodb-local:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      AWS_DEFAULT_REGION: us-east-1
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        # Create file_locations table
        aws dynamodb create-table \
          --endpoint-url http://dynamodb-local:8000 \
          --table-name file_locations \
          --attribute-definitions \
            AttributeName=tag_id,AttributeType=S \
            AttributeName=case_number,AttributeType=S \
          --key-schema AttributeName=tag_id,KeyType=HASH \
          --global-secondary-indexes \
            'IndexName=case-number-index,KeySchema=[{AttributeName=case_number,KeyType=HASH}],Projection={ProjectionType=ALL}' \
          --billing-mode PAY_PER_REQUEST \
          2>/dev/null || echo "file_locations table exists"

        # Create file_movements table
        aws dynamodb create-table \
          --endpoint-url http://dynamodb-local:8000 \
          --table-name file_movements \
          --attribute-definitions \
            AttributeName=tag_id,AttributeType=S \
            AttributeName=timestamp,AttributeType=S \
          --key-schema \
            AttributeName=tag_id,KeyType=HASH \
            AttributeName=timestamp,KeyType=RANGE \
          --billing-mode PAY_PER_REQUEST \
          2>/dev/null || echo "file_movements table exists"

        # Create readers table
        aws dynamodb create-table \
          --endpoint-url http://dynamodb-local:8000 \
          --table-name readers \
          --attribute-definitions \
            AttributeName=reader_id,AttributeType=S \
          --key-schema AttributeName=reader_id,KeyType=HASH \
          --billing-mode PAY_PER_REQUEST \
          2>/dev/null || echo "readers table exists"

        # Create tags table
        aws dynamodb create-table \
          --endpoint-url http://dynamodb-local:8000 \
          --table-name tags \
          --attribute-definitions \
            AttributeName=tag_id,AttributeType=S \
          --key-schema AttributeName=tag_id,KeyType=HASH \
          --billing-mode PAY_PER_REQUEST \
          2>/dev/null || echo "tags table exists"

        echo "All tables ready."
